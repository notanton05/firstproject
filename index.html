<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Canvas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #6ec9ff 0%, #b8e0f5 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    canvas {
      width: 400px;
      height: 600px;
      display: block;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }
  </style>
</head>
<body>
  <canvas id="board" width="400" height="600" aria-label="Flappy-style mini game"></canvas>

  <script>
    (function () {
      // ---------------------------------------------------------------------------
      // Canvas + timing
      // ---------------------------------------------------------------------------
      var canvas = document.getElementById("board");
      var ctx = canvas.getContext("2d");
      var W = canvas.width;
      var H = canvas.height;

      var TICK_MS = 1000 / 60;
      var accMs = 0;
      var lastNow = performance.now();

      // ---------------------------------------------------------------------------
      // Game state machine: only one state is active at a time.
      // START    — waiting for first input; physics and pipe spawning are paused.
      // PLAYING  — simulation runs; jumps, collisions, and scoring apply.
      // GAME_OVER — frozen world; next click returns to START after a full reset.
      // Switching states keeps unrelated logic out of each branch (readable + fewer bugs).
      // ---------------------------------------------------------------------------
      var State = { START: "start", PLAYING: "playing", GAME_OVER: "gameover" };
      var gameState = State.START;

      // ---------------------------------------------------------------------------
      // World / bird constants
      // ---------------------------------------------------------------------------
      var GROUND_H = 76;
      var GROUND_TOP = H - GROUND_H;
      var GRAVITY = 0.42;
      var JUMP_VY = -9;

      var birdX = 80;
      var birdY = 250;
      var birdW = 34;
      var birdH = 24;
      var birdVy = 0;

      // ---------------------------------------------------------------------------
      // Pipe constants + array
      // Each pipe is a plain object (record) describing one obstacle column:
      //   x      — left edge of the pipe column in canvas pixels (moves left each tick).
      //   gapY   — top edge of the vertical gap birds fly through (hole starts here).
      //   gapH   — height of the gap in pixels (fixed 180 for consistent difficulty).
      //   w      — column width (60); same for top and bottom segments.
      //   passed — scoring flag: once true, crossing this pipe will not add score again.
      // Top solid: rectangle from y=0 down to y=gapY.
      // Bottom solid: rectangle from y=gapY+gapH down to the ground line.
      // ---------------------------------------------------------------------------
      var PIPE_W = 60;
      var GAP_H = 180;
      var PIPE_SPEED = 2;
      var SPAWN_FRAMES = 120;
      var pipes = [];
      var frameIndex = 0;

      var score = 0;

      // ---------------------------------------------------------------------------
      // Reset: restores the initial session values so a new run matches the first load.
      // Called after GAME_OVER when the player clicks to restart (also used internally
      // if we ever need a hard reset). Order: clear motion, clear obstacles, clear score,
      // reset timing aid, return UI to the start gate.
      // ---------------------------------------------------------------------------
      function resetGame() {
        birdX = 80;
        birdY = 250;
        birdVy = 0;
        pipes.length = 0;
        score = 0;
        frameIndex = 0;
        gameState = State.START;
      }

      // ---------------------------------------------------------------------------
      // Input: jump triggers on canvas click or Space (gameplay + first start).
      // First activation from START begins PLAYING and applies the same jump impulse.
      // After GAME_OVER, click is handled separately (restart) and does not use jump.
      // ---------------------------------------------------------------------------
      function tryJump() {
        if (gameState === State.START) {
          gameState = State.PLAYING;
          birdVy = JUMP_VY;
          return;
        }
        if (gameState === State.PLAYING) {
          birdVy = JUMP_VY;
        }
      }

      canvas.addEventListener("click", function () {
        if (gameState === State.GAME_OVER) {
          resetGame();
          return;
        }
        tryJump();
      });

      window.addEventListener("keydown", function (e) {
        if (e.code === "Space" || e.key === " ") {
          e.preventDefault();
          if (gameState === State.GAME_OVER) {
            resetGame();
            return;
          }
          tryJump();
        }
      });

      // ---------------------------------------------------------------------------
      // Random gap placement (playable vertical range)
      // We want gapY such that the full gap fits between a top margin and the ground.
      // minGapY / maxGapY clamp the random roll so the hole is never flush to ceiling
      // or floor (unfair) and never drawn past the ground line.
      // Math.random() returns [0, 1); scaling gives a continuous range between endpoints.
      // ---------------------------------------------------------------------------
      function randomGapY() {
        var margin = 56;
        var minGapY = margin;
        var maxGapY = GROUND_TOP - GAP_H - margin;
        return minGapY + Math.random() * (maxGapY - minGapY);
      }

      function spawnPipe() {
        // Array.prototype.push appends one element to the END of pipes in place and
        // returns the new length. We allocate a fresh object literal each spawn.
        pipes.push({
          x: W,
          gapY: randomGapY(),
          gapH: GAP_H,
          w: PIPE_W,
          passed: false,
        });
      }

      // ---------------------------------------------------------------------------
      // Axis-aligned bounding box (AABB) overlap test.
      // Two rectangles overlap iff they overlap on BOTH axes:
      //   X overlap: each box’s horizontal span intersects the other’s span.
      //   We use half-open intervals conceptually: overlap if NOT separated.
      //   Separation on X: rect A is entirely left of B → A.right <= B.left (or mirror).
      //   If not separated on X and not separated on Y, the boxes intersect.
      // Returns true if intersecting (collision).
      // ---------------------------------------------------------------------------
      function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
        return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
      }

      // Hitbox matches the yellow body (fair vs. decorative beak/eye drawn outside).
      function birdHitbox() {
        return { x: birdX, y: birdY, w: birdW, h: birdH };
      }

      // ---------------------------------------------------------------------------
      // Collision: bird vs ceiling/floor, then bird vs each pipe’s top and bottom slabs.
      // Stops the game on first hit; sets GAME_OVER so updates halt until restart.
      // ---------------------------------------------------------------------------
      function checkCollisions() {
        var b = birdHitbox();

        // Ceiling / ground: compare bird hitbox edges to world bounds.
        // Top violation: any part above y=0 → b.y < 0.
        // Ground: the walkable/drawn ground begins at GROUND_TOP; if the bird’s bottom
        // (b.y + b.h) is strictly below that line, it has entered the solid ground band.
        if (b.y < 0 || b.y + b.h > GROUND_TOP) {
          gameState = State.GAME_OVER;
          return;
        }

        for (var i = 0; i < pipes.length; i++) {
          var p = pipes[i];
          // Column splits into two solids: [0, gapY) and [gapY+gapH, GROUND_TOP).
          var topH = p.gapY;
          var bottomY = p.gapY + p.gapH;
          var bottomH = GROUND_TOP - bottomY;

          // Each slab is its own AABB; the gap region deliberately has NO collider.
          if (rectsOverlap(b.x, b.y, b.w, b.h, p.x, 0, p.w, topH)) {
            gameState = State.GAME_OVER;
            return;
          }
          if (rectsOverlap(b.x, b.y, b.w, b.h, p.x, bottomY, p.w, bottomH)) {
            gameState = State.GAME_OVER;
            return;
          }
        }
      }

      // ---------------------------------------------------------------------------
      // Scoring: award once per pipe when the bird’s front clears the pipe’s right edge.
      // Using birdX (left edge) vs pipe right (p.x + p.w) avoids double counting:
      // mark p.passed true after incrementing. Loop checks every pipe each tick.
      // ---------------------------------------------------------------------------
      function updateScore() {
        for (var i = 0; i < pipes.length; i++) {
          var p = pipes[i];
          if (!p.passed && birdX > p.x + p.w) {
            p.passed = true;
            score += 1;
          }
        }
      }

      // ---------------------------------------------------------------------------
      // Drawing helpers
      // ---------------------------------------------------------------------------
      function drawSkyGradient() {
        var g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, "#7ec8ff");
        g.addColorStop(0.55, "#bfe9ff");
        g.addColorStop(1, "#e8f7ff");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }

      function drawGround() {
        var grd = ctx.createLinearGradient(0, GROUND_TOP, 0, H);
        grd.addColorStop(0, "#6a9e3a");
        grd.addColorStop(1, "#4a7a2a");
        ctx.fillStyle = grd;
        ctx.fillRect(0, GROUND_TOP, W, GROUND_H);
        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.fillRect(0, GROUND_TOP, W, 4);
      }

      // Caps: slightly wider rectangles at pipe mouths for a classic look + border.
      function drawPipeColumn(p) {
        var capExtra = 6;
        var capH = 14;
        var border = "#14532d";
        var fill = "#2bbf6a";
        var shade = "rgba(0,0,0,0.12)";

        function drawSegment(x, y, w, h, capAtBottom) {
          if (h <= 0) return;
          ctx.save();
          ctx.fillStyle = shade;
          ctx.fillRect(x + 3, y + 3, w, h);
          ctx.fillStyle = fill;
          ctx.fillRect(x, y, w, h);
          ctx.strokeStyle = border;
          ctx.lineWidth = 3;
          ctx.strokeRect(x + 1.5, y + 1.5, w - 3, h - 3);
          var capW = w + capExtra * 2;
          var capX = x - capExtra;
          var cy = capAtBottom ? y + h - capH : y;
          ctx.fillStyle = shade;
          ctx.fillRect(capX + 2, cy + 2, capW, capH);
          ctx.fillStyle = "#34d07b";
          ctx.fillRect(capX, cy, capW, capH);
          ctx.strokeRect(capX + 1.5, cy + 1.5, capW - 3, capH - 3);
          ctx.restore();
        }

        var topH = p.gapY;
        drawSegment(p.x, 0, p.w, topH, true);

        var bottomY = p.gapY + p.gapH;
        var bottomH = GROUND_TOP - bottomY;
        drawSegment(p.x, bottomY, p.w, bottomH, false);
      }

      // Rounded body path (avoids ctx.roundRect for older browsers)
      function pathRoundRect(ctx2, x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx2.beginPath();
        ctx2.moveTo(x + r, y);
        ctx2.arcTo(x + w, y, x + w, y + h, r);
        ctx2.arcTo(x + w, y + h, x, y + h, r);
        ctx2.arcTo(x, y + h, x, y, r);
        ctx2.arcTo(x, y, x + w, y, r);
        ctx2.closePath();
      }

      function drawBird() {
        var bx = birdX;
        var by = birdY;

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath();
        ctx.ellipse(bx + birdW / 2 + 2, by + birdH / 2 + 3, birdW * 0.55, birdH * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffeb3b";
        ctx.strokeStyle = "#c9a227";
        ctx.lineWidth = 2;
        pathRoundRect(ctx, bx, by, birdW, birdH, 6);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#ff8f3c";
        ctx.beginPath();
        ctx.moveTo(bx + birdW, by + 7);
        ctx.lineTo(bx + birdW + 12, by + 11);
        ctx.lineTo(bx + birdW, by + 15);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#cc6a24";
        ctx.stroke();

        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(bx + birdW * 0.55, by + birdH * 0.42, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#222";
        ctx.beginPath();
        ctx.arc(bx + birdW * 0.58, by + birdH * 0.42, 2.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawScore() {
        var label = String(score);
        ctx.save();
        ctx.font = "bold 42px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(0,0,0,0.65)";
        ctx.strokeText(label, W / 2, 14);
        ctx.fillStyle = "#ffffff";
        ctx.fillText(label, W / 2, 14);
        ctx.restore();
      }

      function drawCenteredLines(lines, mainSize, subSize, mainColor, subColor) {
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (var i = 0; i < lines.length; i++) {
          var isMain = i === 0;
          ctx.font = (isMain ? mainSize : subSize) + "px system-ui, sans-serif";
          ctx.fillStyle = isMain ? mainColor : subColor;
          ctx.fillText(lines[i], W / 2, H / 2 - 28 + i * (isMain ? 52 : 36));
        }
      }

      function drawOverlayTexts() {
        ctx.save();
        if (gameState === State.START) {
          drawCenteredLines(
            ["Click to Start", "Space / click to flap"],
            34,
            18,
            "#0d3d5c",
            "#1a5a7a"
          );
        } else if (gameState === State.GAME_OVER) {
          drawCenteredLines(
            ["Game Over", "Score: " + score, "Click or Space to restart"],
            40,
            20,
            "#7a1020",
            "#4a0a14"
          );
        }
        ctx.restore();
      }

      function drawWorld() {
        drawSkyGradient();
        for (var i = 0; i < pipes.length; i++) {
          drawPipeColumn(pipes[i]);
        }
        drawGround();
        drawBird();
        if (gameState === State.PLAYING) {
          drawScore();
        }
        drawOverlayTexts();
      }

      // ---------------------------------------------------------------------------
      // Fixed timestep simulation (60 Hz)
      // ---------------------------------------------------------------------------
      function simulateOneTick() {
        if (gameState !== State.PLAYING) {
          return;
        }

        birdVy += GRAVITY;
        birdY += birdVy;

        for (var i = 0; i < pipes.length; i++) {
          pipes[i].x -= PIPE_SPEED;
        }

        frameIndex += 1;
        if (frameIndex % SPAWN_FRAMES === 0) {
          spawnPipe();
        }

        // Remove pipes that have fully exited the left side to keep the array small.
        // Array.prototype.filter walks the array, calls your function on each element,
        // and returns a BRAND-NEW array of only the truthy results (non-mutating read).
        // We reassign `pipes` to that new array, dropping columns with p.x + p.w <= 0
        // (entire pipe past the left canvas edge).
        pipes = pipes.filter(function (p) {
          return p.x + p.w > 0;
        });

        updateScore();
        checkCollisions();
      }

      function gameLoop(now) {
        requestAnimationFrame(gameLoop);

        var dt = now - lastNow;
        lastNow = now;
        accMs += dt;

        var safety = 10;
        while (accMs >= TICK_MS && safety-- > 0) {
          accMs -= TICK_MS;
          simulateOneTick();
        }

        drawWorld();
      }

      requestAnimationFrame(gameLoop);
    })();
  </script>
</body>
</html>
